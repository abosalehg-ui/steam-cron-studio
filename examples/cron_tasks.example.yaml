# ============================================================
# cron_tasks.example.yaml — Complete Reference File
# Generated by Steam Cron Studio
# https://github.com/abosalehg-ui/steam-cron-studio
#
# This is the FULL example with all 8 tasks enabled.
# Customize then rename to cron_tasks.yaml on your server.
#
# Required env variables:
#   STEAM_WEB_API_KEY              - from https://steamcommunity.com/dev/apikey
#   OPENCLAW_TELEGRAM_BOT_TOKEN    - from @BotFather on Telegram
#   ITAD_API_KEY                   - from https://isthereanydeal.com/apps/my/ (Task 7 only)
# ============================================================

version: "3.0"
agent: OpenClaw

globals:
  timezone: Asia/Riyadh
  locale: ar-SA
  region_cc: sa
  language: arabic
  currency: SAR
  steam_api_key: "${STEAM_WEB_API_KEY}"
  steam_id: "76561198017149971"          # Replace with your SteamID64
  itad_api_key: "${ITAD_API_KEY}"
  notification:
    channel: telegram
    chat_id: "6803381"                   # Replace with your Telegram Chat ID
    parse_mode: HTML                     # MUST be set explicitly per API call
    disable_web_page_preview: true
  http:
    timeout_seconds: 10
    max_retries: 2
    backoff: exponential
  state_dir: "./state"
  renders_dir: "./state/renders"

  rendering:
    engine: playwright
    browser: chromium
    viewport:
      width: 1080
      height: 1920
    device_scale_factor: 2
    full_page: true
    timeout_ms: 30000
    wait_for: networkidle

  design_system:
    theme: steam_dark
    colors:
      bg_gradient_start: "#1b2838"
      bg_gradient_end:   "#2a475e"
      card_bg:           "rgba(23, 44, 66, 0.85)"
      card_border:       "rgba(102, 192, 244, 0.25)"
      accent_gold:       "#c7a008"
      accent_green:      "#5c7e10"
      accent_red:        "#a94442"
      accent_fire:       "#ff6b35"
      text_primary:      "#c7d5e0"
      text_secondary:    "#8f98a0"
      text_white:        "#ffffff"
    fonts:
      arabic_primary:    "'Amiri', 'Scheherazade New', serif"
      latin:             "'Inter', 'Segoe UI', sans-serif"
      google_fonts_href: "https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;800&display=swap"
    game_thumbnail_url: "https://cdn.cloudflare.steamstatic.com/steam/apps/{APPID}/header.jpg"
    fallback_thumbnail: "https://cdn.cloudflare.steamstatic.com/steam/apps/{APPID}/capsule_616x353.jpg"
    watermark: "Generated by OpenClaw · {date}"

# ============================================================
tasks:

  # ── Task 1: Daily 100% Discount Scanner ──────────────────
  - id: steam_free_deals_daily
    name: "ماسح التخفيضات 100٪"
    schedule: "0 16 * * *"
    enabled: true
    config:
      fallback_threshold: 95
      max_results: 10
      exclude_owned: true
    prompt: |
      You are OpenClaw, a Steam deals monitoring agent for region SA (Saudi Arabia).
      OBJECTIVE: Identify every game on Steam currently at 100% discount (temporarily free).
      See full prompt spec in the cron_tasks.yaml from the builder.
      output_format: IMAGE

  # ── Task 2: Wishlist ≥70% Monitor ────────────────────────
  - id: steam_wishlist_deals_daily
    name: "مراقب تخفيضات قائمة الرغبات"
    schedule: "0 20 * * *"
    enabled: true
    config:
      min_discount: 70
      max_results: 15
      skip_if_empty: false
    prompt: |
      You are OpenClaw, monitoring the wishlist for deep discounts ≥70%.
      output_format: TEXT

  # ── Task 3: Game of the Week ──────────────────────────────
  - id: steam_game_of_the_week
    name: "لعبة الأسبوع"
    schedule: "15 14 * * 4"
    enabled: true
    config:
      preferred_genres: ["Strategy", "Simulation", "RPG", "Indie", "Historical", "Puzzle", "Adventure"]
      disliked_genres: ["Horror", "Battle Royale", "Sexual Content"]
      max_playtime_minutes: 1200
      no_repeat_weeks: 8
      include_family: true
    prompt: |
      You are OpenClaw, a personal game curator. Every Thursday pick ONE game.
      output_format: IMAGE

  # ── Task 4: Achievement Hunter ────────────────────────────
  - id: steam_achievement_hunter
    name: "صائد الإنجازات"
    schedule: "0 10 * * 5"
    enabled: true
    config:
      min_rarity: 15
      max_rarity: 65
      dedupe_weeks: 12
    prompt: |
      You are OpenClaw, a Steam achievement coach. Every Friday suggest ONE achievement.
      output_format: TEXT

  # ── Task 5: Regional Price Intelligence ──────────────────
  - id: steam_regional_price_intel
    name: "تحليل الأسعار الإقليمية"
    schedule: "0 11 * * 0"
    enabled: true
    config:
      premium_threshold: 25
      bargain_threshold: 15
      max_candidates: 60
    prompt: |
      You are OpenClaw, a Steam regional pricing analyst.
      output_format: TEXT

  # ── Task 6: Friends' Gift Opportunities ──────────────────
  - id: steam_gift_opportunities
    name: "فرص إهداء الأصدقاء"
    schedule: "0 19 * * 2"
    enabled: true
    config:
      min_discount: 50
      max_price_sar: 150
      cache_days: 7
    prompt: |
      You are OpenClaw, helping find gifting opportunities for friends.
      PRIVACY: HIGH — NEVER render as image. Send as text only.
      output_format: TEXT_ONLY

  # ── Task 7: Cross-Platform Prices ────────────────────────
  - id: steam_cross_platform_prices
    name: "مقارنة المتاجر"
    schedule: "0 17 * * 6"
    enabled: false                       # Requires ITAD_API_KEY
    config:
      min_savings_percent: 15
      exclude_gray_market: true
    prompt: |
      You are OpenClaw, comparing Steam prices vs GOG/Epic/Humble via ITAD.
      output_format: TEXT

  # ── Task 8: Weekly Wrap-Up ────────────────────────────────
  - id: steam_weekly_wrapup
    name: "تقرير الأسبوع"
    schedule: "0 9 * * 0"
    enabled: true
    config:
      archive_after_days: 30
    prompt: |
      You are OpenClaw, preparing the weekly consolidated digest.
      output_format: IMAGE

# ============================================================
state_files:
  - path: ./state/owned_games.json
  - path: ./state/wishlist.json
  - path: ./state/picks_history.json
  - path: ./state/achievement_suggestions_history.json
  - path: ./state/fx_rates.json
  - path: ./state/friends_wishlists.json
  - path: ./state/itad_mappings.json
  - path: ./state/archive/

required_env:
  - STEAM_WEB_API_KEY
  - OPENCLAW_TELEGRAM_BOT_TOKEN
  # - ITAD_API_KEY      # Uncomment if using Task 7

# ============================================================
# SCHEDULE SUMMARY (Asia/Riyadh)
# 0 16 * * *    → ماسح التخفيضات 100٪         🖼️ IMAGE
# 0 20 * * *    → مراقب قائمة الرغبات          📝 TEXT
# 0 9  * * 0    → تقرير الأسبوع                🖼️ IMAGE
# 0 11 * * 0    → تحليل الأسعار الإقليمية       📝 TEXT
# 0 19 * * 2    → فرص إهداء الأصدقاء           📝 TEXT
# 15 14 * * 4   → لعبة الأسبوع                 🖼️ IMAGE
# 0 10 * * 5    → صائد الإنجازات               📝 TEXT
# 0 17 * * 6    → مقارنة المتاجر               📝 TEXT
